<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPath — NeuroGuide</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #060a0f;
            --black-2: #0a1018;
            --black-3: #0f1a24;
            --blue: #1a8cff;
            --blue-dim: rgba(26, 140, 255, 0.12);
            --blue-border: rgba(26, 140, 255, 0.2);
            --green: #00c97a;
            --green-dim: rgba(0, 201, 122, 0.1);
            --green-border: rgba(0, 201, 122, 0.22);
            --text: #c8dde8;
            --text-dim: #4a6678;
            --text-bright: #e8f4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--black);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(26,140,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26,140,255,0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 820px;
            margin: 0 auto;
            width: 100%;
            padding: 0 24px;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--blue-border);
            flex-shrink: 0;
        }

        .logo-group { display: flex; align-items: center; gap: 12px; }

        .logo-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 6px var(--green); }
            50% { box-shadow: 0 0 14px var(--green); opacity: 0.6; }
        }

        .title-block h1 {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-bright);
        }

        .title-block p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .dashboard-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.5px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--blue-border);
            color: var(--blue);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .dashboard-btn:hover {
            background: var(--blue-dim);
            border-color: var(--blue);
        }

        /* CHAT */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: rgba(26,140,255,0.15) transparent;
        }

        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: var(--blue-border); border-radius: 2px; }

        /* EMPTY STATE */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 40px 20px;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ring-wrap { margin-bottom: 26px; }
        .ring-wrap svg { animation: rotate 14s linear infinite; }
        @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        .empty-state h2 {
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-bright);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            margin-bottom: 28px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 480px;
        }

        .suggestions button {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 8px 16px;
            background: var(--black-2);
            border: 1px solid var(--blue-border);
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .suggestions button:hover {
            border-color: var(--blue);
            color: var(--text);
            background: var(--blue-dim);
        }

        /* MESSAGES */
        .message {
            max-width: 78%;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--black-3);
            border: 1px solid var(--blue-border);
            border-radius: 10px 10px 2px 10px;
            padding: 11px 15px;
            font-size: 0.9rem;
            color: var(--text-bright);
            line-height: 1.5;
        }

        .message.bot { align-self: flex-start; }

        /* TYPING */
        .typing-wrap { display: flex; align-items: center; gap: 10px; }

        .bot-pip {
            width: 26px; height: 26px;
            border: 1px solid var(--blue-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bot-pip span {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--blue);
            display: block;
        }

        .typing-bubble {
            background: var(--black-2);
            border: 1px solid var(--blue-border);
            border-radius: 10px 10px 10px 2px;
            padding: 12px 16px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--blue);
            opacity: 0.35;
            animation: dotBounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.18s; }
        .dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes dotBounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.35; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* REC CARD */
        .rec-card {
            background: var(--black-2);
            border: 1px solid var(--blue-border);
            border-left: 2px solid var(--blue);
            border-radius: 2px 10px 10px 2px;
            padding: 16px 18px;
            align-self: flex-start;
            max-width: 94%;
            width: 100%;
            transition: border-color 0.2s;
        }

        .rec-card:hover { border-color: rgba(26,140,255,0.4); }

        .rec-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .rec-title {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-bright);
        }

        .rec-score {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            color: var(--green);
            border: 1px solid var(--green-border);
            background: var(--green-dim);
            padding: 3px 9px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }

        .score-bar-track {
            height: 2px;
            background: rgba(26,140,255,0.08);
            border-radius: 1px;
            margin: 10px 0;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--green));
            border-radius: 1px;
            animation: barGrow 0.7s ease;
        }

        @keyframes barGrow { from { width: 0% !important; } }

        .rec-explanation {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.7;
            margin-bottom: 14px;
        }

        .rec-actions { display: flex; gap: 8px; }

        .btn-like, .btn-dislike {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.67rem;
            padding: 7px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid;
        }

        .btn-like {
            background: var(--green-dim);
            border-color: var(--green-border);
            color: var(--green);
        }

        .btn-like:hover, .btn-like.active {
            background: rgba(0,201,122,0.2);
            border-color: var(--green);
        }

        .btn-dislike {
            background: transparent;
            border-color: rgba(26,140,255,0.15);
            color: var(--text-dim);
        }

        .btn-dislike:hover, .btn-dislike.active {
            background: var(--blue-dim);
            border-color: var(--blue);
            color: var(--text);
        }

        /* INPUT */
        .input-box {
            display: flex;
            gap: 10px;
            padding: 14px 0 20px;
            border-top: 1px solid var(--blue-border);
            flex-shrink: 0;
        }

        #input {
            flex: 1;
            background: var(--black-2);
            border: 1px solid var(--blue-border);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--text-bright);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s;
            caret-color: var(--blue);
        }

        #input::placeholder { color: var(--text-dim); }
        #input:focus { border-color: rgba(26,140,255,0.5); }

        .send-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
            padding: 12px 22px;
            background: var(--blue-dim);
            border: 1px solid var(--blue);
            color: var(--blue);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: rgba(26,140,255,0.22);
            color: var(--text-bright);
        }

        .send-btn:active { transform: scale(0.98); }
        .fade-out { animation: fadeOut 0.25s forwards; }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <div class="logo-group">
            <div class="logo-dot"></div>
            <div class="title-block">
                <h1>MindPath</h1>
                <p>neuroguide · knowledge graph ai</p>
            </div>
        </div>
        <button class="dashboard-btn" onclick="goToDashboard()">Analytics →</button>
    </div>

    <div id="chat">
        <div id="emptyState" class="empty-state">
            <div class="ring-wrap">
                <svg width="76" height="76" viewBox="0 0 76 76" fill="none">
                    <circle cx="38" cy="38" r="34" stroke="rgba(26,140,255,0.2)" stroke-width="1" stroke-dasharray="6 4"/>
                    <circle cx="38" cy="38" r="24" stroke="rgba(0,201,122,0.15)" stroke-width="1" stroke-dasharray="3 5"/>
                    <circle cx="38" cy="4" r="2.5" fill="rgba(26,140,255,0.5)"/>
                    <circle cx="72" cy="38" r="2" fill="rgba(0,201,122,0.5)"/>
                    <circle cx="38" cy="72" r="2.5" fill="rgba(26,140,255,0.4)"/>
                    <circle cx="4" cy="38" r="2" fill="rgba(0,201,122,0.35)"/>
                </svg>
            </div>
            <h2>How are you feeling today?</h2>
            <p>describe your mental state and get personalized guidance</p>
            <div class="suggestions">
                <button onclick="quickFill('I feel stressed and overwhelmed')">Stressed</button>
                <button onclick="quickFill('I am feeling anxious and restless')">Anxious</button>
                <button onclick="quickFill('I feel tired and drained')">Fatigued</button>
                <button onclick="quickFill('I cannot sleep at night')">Sleep issues</button>
                <button onclick="quickFill('I feel depressed and unmotivated')">Low mood</button>
                <button onclick="quickFill('I am overthinking everything')">Overthinking</button>
            </div>
        </div>
    </div>

    <div class="input-box">
        <input id="input" placeholder="Describe how you're feeling..." onkeydown="if(event.key==='Enter') send()"/>
        <button class="send-btn" onclick="send()">Send →</button>
    </div>

</div>
<script>
    const MAX_SCORE = 6;

    function addMessage(text, cls) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "message " + cls;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "message bot";
        div.id = "typing";
        div.innerHTML = `
            <div class="typing-wrap">
                <div class="bot-pip"><span></span></div>
                <div class="typing-bubble">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    function addCard(rec) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "message bot";
        const pct = Math.min((rec.score / MAX_SCORE) * 100, 100).toFixed(0);
        div.innerHTML = `
            <div class="rec-card">
                <div class="rec-header">
                    <div class="rec-title">${rec.technique}</div>
                    <div class="rec-score">score ${rec.score}</div>
                </div>
                <div class="score-bar-track">
                    <div class="score-bar-fill" style="width:${pct}%"></div>
                </div>
                <div class="rec-explanation">${rec.explanation}</div>
                <div class="rec-actions">
                    <button class="btn-like" onclick="sendFeedback('${rec.technique}', true, this)">↑ Helpful</button>
                    <button class="btn-dislike" onclick="sendFeedback('${rec.technique}', false, this)">↓ Not for me</button>
                </div>
            </div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function quickFill(text) {
        document.getElementById("input").value = text;
        document.getElementById("input").focus();
    }

    async function send() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if (!text) return;
        const emptyState = document.getElementById("emptyState");
        if (emptyState) emptyState.style.display = "none";
        addMessage(text, "user");
        input.value = "";
        showTyping();
        try {
            const res = await fetch("http://127.0.0.1:8000/recommend", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ texts: [text] })
            });
            const data = await res.json();
            removeTyping();
            data.recommendations.forEach((r, i) => {
                setTimeout(() => addCard(r), i * 300);
            });
        } catch {
            removeTyping();
            addMessage("Could not connect to the neural engine. Make sure the API is running.", "bot");
        }
    }

    async function sendFeedback(technique, liked, btn) {
        const card = btn.closest('.rec-card');
        card.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        await fetch("http://127.0.0.1:8000/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: "user1", technique, liked })
        });
    }

    function goToDashboard() {
        document.body.classList.add("fade-out");
        setTimeout(() => { window.location.href = "dashboard.html"; }, 250);
    }
</script>
</body>
</html>
